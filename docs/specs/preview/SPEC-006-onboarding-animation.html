<!doctype html>
<html lang="pl" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SPEC-006 · Preview — animacja „krok po kroku" (v4, telefon + zegarek + tablica)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&display=swap" rel="stylesheet">
<style>
:root{
  --card:#163E78; --ink:#F5F8FF; --ink-soft:rgba(245,248,255,.64); --ink-faint:rgba(245,248,255,.44);
  --primary:#5980E6; --primary-2:#6E92F0; --accent:#E0F75A; --on-accent:#0A1A33;
  --card-border:rgba(180,210,255,.20); --sep:rgba(180,210,255,.16); --sep-strong:rgba(180,210,255,.30);
  --page:#081C39; --page-2:#0A2247; --primary-glow:rgba(89,128,230,.35); --glow:rgba(224,247,90,.30);
  --shadow-l:0 24px 70px rgba(2,10,26,.6); --font:"Bricolage Grotesque",-apple-system,system-ui,sans-serif;
  --chassis:#05132b;
}
html[data-theme="light"]{
  --card:#FFF; --ink:#0E1730; --ink-soft:rgba(14,23,48,.64); --ink-faint:rgba(14,23,48,.46);
  --primary:#1B49B8; --primary-2:#2F6BE0; --accent:#1B49B8; --on-accent:#FFF;
  --card-border:#E2E8F2; --sep:#E6EBF3; --sep-strong:#D7DEEA;
  --page:#EEF2F9; --page-2:#F7F9FC; --primary-glow:rgba(27,73,184,.20); --glow:rgba(27,73,184,.16);
  --shadow-l:0 24px 60px rgba(20,40,90,.14); --chassis:#0E1730;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);color:var(--ink);background:
  radial-gradient(900px 500px at 15% -5%,var(--primary-glow),transparent 60%),
  radial-gradient(700px 500px at 100% 10%,var(--glow),transparent 55%),
  linear-gradient(180deg,var(--page),var(--page-2));min-height:100vh;padding:40px 20px 70px;-webkit-font-smoothing:antialiased}
.preview-note{max-width:900px;margin:0 auto 10px;font-size:12px;color:var(--ink-faint);letter-spacing:.4px;text-transform:uppercase;font-weight:800}
.theme-btn{position:fixed;top:18px;right:18px;width:44px;height:44px;border-radius:12px;border:1.5px solid var(--sep-strong);background:var(--card);color:var(--ink);font-size:19px;cursor:pointer;z-index:20}

.demo{max-width:920px;margin:0 auto;text-align:center}
.demo .kicker{font-size:13px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--primary-2)}
.demo h2{font-size:clamp(28px,4.4vw,44px);font-weight:800;letter-spacing:-.03em;line-height:1.05;margin:14px 0 14px}
.demo h2 .hl{color:var(--accent)} html[data-theme="light"] .demo h2 .hl{color:var(--primary)}
.demo .lead{font-size:clamp(16px,1.7vw,19px);color:var(--ink-soft);max-width:54ch;margin:0 auto;line-height:1.55;font-weight:450}

.stage{margin:30px auto 0;position:relative;height:600px;display:flex;align-items:center;justify-content:center}
.dev{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(.96);opacity:0;transition:opacity .5s ease,transform .5s ease;pointer-events:none}
.dev.on{opacity:1;transform:translate(-50%,-50%) scale(1)}
.dev-tag{position:absolute;top:-30px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--primary-2);white-space:nowrap}

/* phone (portrait) */
.dphone .phone{width:280px;border-radius:44px;background:var(--chassis);padding:11px;box-shadow:var(--shadow-l);border:1px solid var(--sep-strong)}
.dphone .screen{position:relative;border-radius:34px;overflow:hidden;aspect-ratio:294/640;background:#0B234A}
.dphone .screen img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .45s ease}
.dphone .screen img.show{opacity:1}

/* watch */
.dwatch .case{width:206px;border-radius:56px;background:linear-gradient(145deg,#33383f,#0b0d11 62%);padding:12px 11px;box-shadow:var(--shadow-l),inset 0 1px 1px rgba(255,255,255,.1),inset 0 0 0 1px rgba(0,0,0,.6);position:relative}
.dwatch .crown{position:absolute;right:-3px;top:34%;width:6px;height:26px;border-radius:3px;background:linear-gradient(90deg,#4a4f57,#181b20)}
.dwatch .sbtn{position:absolute;right:-2px;top:54%;width:4px;height:32px;border-radius:3px;background:linear-gradient(90deg,#31353b,#15171b)}
.dwatch .band{height:26px;margin:0 auto;width:120px;background:linear-gradient(180deg,#26292e,#111316)}
.dwatch .band.t{margin-bottom:-6px;border-radius:14px 14px 0 0}.dwatch .band.b{margin-top:-6px;border-radius:0 0 14px 14px}
.dwatch .wscreen{border-radius:44px;overflow:hidden;aspect-ratio:416/496;background:#000}
.dwatch .wscreen img{width:100%;height:100%;object-fit:cover}

/* fence (landscape) */
.dfence .lphone{width:470px;border-radius:32px;background:var(--chassis);padding:9px;box-shadow:var(--shadow-l);border:1px solid var(--sep-strong)}
.dfence .lscreen{border-radius:24px;overflow:hidden;aspect-ratio:1000/460;background:#0B234A}
.dfence .lscreen img{width:100%;height:100%;object-fit:cover;display:block}

/* tap */
.tap{position:absolute;width:52px;height:52px;transform:translate(-50%,-50%);pointer-events:none;z-index:8;opacity:0;transition:opacity .3s}
.tap.on{opacity:1}
.tap .ring{position:absolute;inset:0;border-radius:50%;border:3px solid var(--accent);animation:tr 1.5s ease-out infinite}
.tap .dot{position:absolute;inset:18px;border-radius:50%;background:rgba(224,247,90,.35);box-shadow:0 0 0 3px rgba(224,247,90,.6),0 0 20px var(--glow)}
@keyframes tr{0%{transform:scale(.55);opacity:.95}100%{transform:scale(1.7);opacity:0}}

.cap{margin:26px auto 0;max-width:540px;min-height:80px}
.cap .badge{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--on-accent);background:var(--accent);padding:4px 12px;border-radius:20px}
.cap .txt{font-size:clamp(16px,2vw,20px);font-weight:650;margin-top:13px;line-height:1.4;transition:opacity .3s}
.cap .txt b{font-weight:800}
.progress{max-width:320px;height:3px;border-radius:3px;background:var(--sep);margin:20px auto 0;overflow:hidden}
.progress i{display:block;height:100%;width:0;background:var(--accent)} html[data-theme="light"] .progress i{background:var(--primary)}
.dots{display:flex;gap:9px;justify-content:center;margin-top:18px}
.dots button{width:9px;height:9px;border-radius:50%;border:none;background:var(--sep-strong);cursor:pointer;padding:0;transition:.25s}
.dots button.act{background:var(--accent);width:26px;border-radius:6px} html[data-theme="light"] .dots button.act{background:var(--primary)}
.ctrls{margin-top:20px;display:flex;gap:10px;justify-content:center}
.ctrls button{background:var(--card);border:1.5px solid var(--sep-strong);color:var(--ink);font-family:var(--font);font-weight:700;font-size:13px;padding:9px 16px;border-radius:11px;cursor:pointer}
.ctrls button:hover{border-color:var(--primary)}
@media(prefers-reduced-motion:reduce){.tap .ring{animation:none}}
</style>
</head>
<body>
<button class="theme-btn" id="themeBtn" title="Dark / light">🌙</button>
<div class="preview-note">SPEC-006 · Preview v4 — REALNE zrzuty (telefon + zegarek + tablica), nie na live</div>

<section class="demo">
  <span class="kicker">Jak to działa</span>
  <h2>Zobacz, co <span class="hl">nacisnąć</span> — krok po kroku.</h2>
  <p class="lead">Prawdziwe ekrany. Ustaw mecz na telefonie, licz wynik na zegarku, a telefon zawieś na kracie jako wielką tablicę.</p>

  <div class="stage" id="stage">
    <!-- PHONE -->
    <div class="dev dphone on" data-dev="phone">
      <div class="dev-tag">Telefon</div>
      <div class="phone"><div class="screen" id="phoneScreen">
        <img data-i="0" src="/assets/demo/demo-1.png" alt="Home — Pojedynczy mecz">
        <img data-i="1" src="/assets/demo/demo-2.png" alt="Gracze 2v2">
        <img data-i="2" src="/assets/demo/demo-3.png" alt="Ustawienia — punktacja">
        <img data-i="3" src="/assets/demo/demo-5.png" alt="Karta meczu">
        <img data-i="4" src="/assets/demo/demo-6.png" alt="Statystyki po meczu — Twoje ciało">
      </div></div>
    </div>
    <!-- WATCH -->
    <div class="dev dwatch" data-dev="watch">
      <div class="dev-tag">Zegarek</div>
      <div class="case"><div class="crown"></div><div class="sbtn"></div>
        <div class="band t"></div>
        <div class="wscreen"><img src="/assets/demo/demo-watch.png" alt="Wynik na Apple Watch"></div>
        <div class="band b"></div>
      </div>
    </div>
    <!-- FENCE / TABLICA -->
    <div class="dev dfence" data-dev="fence">
      <div class="dev-tag">Tablica na kracie</div>
      <div class="lphone"><div class="lscreen"><img src="/assets/demo/demo-fence.png" alt="Tablica wyników na kracie"></div></div>
    </div>

    <div class="tap" id="tap"><span class="ring"></span><span class="dot"></span></div>
  </div>

  <div class="cap"><span class="badge" id="capBadge"></span><div class="txt" id="capTxt"></div></div>
  <div class="progress"><i id="prog"></i></div>
  <div class="dots" id="dots"></div>
  <div class="ctrls"><button id="playBtn">⏸ Pauza</button><button id="restartBtn">↻ Od nowa</button></div>
</section>

<script>
// dev: 'phone'|'watch'|'fence'; img: index warstwy telefonu; tap:[x%,y%] w ekranie aktywnego urządzenia
const STEPS = [
  {dev:'phone', img:0, tap:[50,34], badge:'Telefon',        txt:'Otwórz Padelore → <b>Pojedynczy mecz</b> (Szybki start).'},
  {dev:'phone', img:1, tap:[65,90], badge:'Telefon',        txt:'Ustaw pary — Ty, partner, rywale — i <b>Dalej · konfiguracja</b>.'},
  {dev:'phone', img:2, tap:[50,90], badge:'Telefon',        txt:'Wybierz punktację (np. <b>21</b>) i <b>Rozpocznij mecz</b>.'},
  {dev:'watch',        tap:[50,78], badge:'Zegarek',        txt:'Wynik zapisujesz <b>na nadgarstku</b> — tapnij swoją stronę (MY) na zegarku.'},
  {dev:'fence',        tap:null,    badge:'Tablica',        txt:'Telefon zawieszasz na kracie — <b>wielki wynik</b> widoczny z drugiego końca kortu.'},
  {dev:'phone', img:3, tap:null,    badge:'Telefon',        txt:'Koniec meczu → <b>karta meczu</b>: wynik, sety, kluczowe momenty.'},
  {dev:'phone', img:4, tap:null,    badge:'Statystyki',     txt:'Zjeżdżasz niżej → <b>ile Cię kosztował</b>: wysiłek, strefy tętna, regeneracja.'},
];
const DUR = 3400;
let i=0, playing=true, timer=null, progRAF=null, progStart=0;
const devs={phone:document.querySelector('.dphone'),watch:document.querySelector('.dwatch'),fence:document.querySelector('.dfence')};
const phoneImgs=[...document.querySelectorAll('#phoneScreen img')];
const stage=document.getElementById('stage'), tap=document.getElementById('tap');
const capBadge=document.getElementById('capBadge'), capTxt=document.getElementById('capTxt');
const prog=document.getElementById('prog'), dotsEl=document.getElementById('dots'), playBtn=document.getElementById('playBtn');
STEPS.forEach((_,n)=>{const b=document.createElement('button');b.onclick=()=>go(n);dotsEl.appendChild(b);});
const dots=[...dotsEl.children];
function screenOf(dev){return dev==='phone'?document.getElementById('phoneScreen'):dev==='watch'?document.querySelector('.dwatch .wscreen'):document.querySelector('.dfence .lscreen');}
function placeTap(s){
  if(!s.tap){tap.classList.remove('on');return;}
  const sc=screenOf(s.dev).getBoundingClientRect(), sr=stage.getBoundingClientRect();
  tap.style.left=(sc.left-sr.left+sc.width*s.tap[0]/100)+'px';
  tap.style.top=(sc.top-sr.top+sc.height*s.tap[1]/100)+'px';
  tap.classList.add('on');
}
function startProg(){cancelAnimationFrame(progRAF);progStart=null;
  function f(t){if(progStart===null)progStart=t;const p=Math.min(1,(t-progStart)/DUR);prog.style.width=(p*100)+'%';if(p<1&&playing)progRAF=requestAnimationFrame(f);}
  progRAF=requestAnimationFrame(f);}
function render(){
  const s=STEPS[i];
  Object.entries(devs).forEach(([k,el])=>el.classList.toggle('on',k===s.dev));
  if(s.dev==='phone') phoneImgs.forEach((im,n)=>im.classList.toggle('show',n===s.img));
  capBadge.textContent='Krok '+(i+1)+' / '+STEPS.length+' · '+s.badge;
  capTxt.style.opacity=0; setTimeout(()=>{capTxt.innerHTML=s.txt;capTxt.style.opacity=1;},150);
  dots.forEach((d,n)=>d.classList.toggle('act',n===i));
  tap.classList.remove('on'); setTimeout(()=>placeTap(s),560);
  startProg();
}
function go(n){i=(n+STEPS.length)%STEPS.length;render();schedule();}
function schedule(){clearTimeout(timer);if(playing)timer=setTimeout(()=>go(i+1),DUR);}
function setPlaying(p){playing=p;playBtn.textContent=p?'⏸ Pauza':'▶ Odtwórz';if(p){schedule();startProg();}else{clearTimeout(timer);cancelAnimationFrame(progRAF);}}
playBtn.onclick=()=>setPlaying(!playing);
document.getElementById('restartBtn').onclick=()=>{setPlaying(true);go(0);};
window.addEventListener('resize',()=>placeTap(STEPS[i]));
const tb=document.getElementById('themeBtn');
tb.onclick=()=>{const d=document.documentElement.getAttribute('data-theme')==='dark';document.documentElement.setAttribute('data-theme',d?'light':'dark');tb.textContent=d?'☀️':'🌙';placeTap(STEPS[i]);};
render();schedule();
</script>
</body>
</html>
